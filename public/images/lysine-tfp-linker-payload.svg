<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .line { stroke: #0f172a; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 2.5; }
      .label { font: 32px sans-serif; fill: #0f172a; }
      .small { font: 26px sans-serif; fill: #0f172a; }
      .blue { fill: #2563eb; }
      .red { fill: #ef4444; }
      .payload { fill: #a3c7f2; stroke: #3b82f6; stroke-width: 3; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f172a" />
    </marker>
  </defs>

  <!-- IgG line art (left, top) -->
  <g transform="translate(90,60)">
    <path class="line" d="M200 520V250" />
    <path class="line" d="M200 250L80 70" />
    <path class="line" d="M200 250L320 70" />
    <path class="line thin" d="M185 520V270" />
    <path class="line thin" d="M215 520V270" />
    <path class="line thin" d="M185 270L80 110" />
    <path class="line thin" d="M215 270L320 110" />
    <path class="line thin" d="M70 70L150 190" />
    <path class="line thin" d="M330 70L250 190" />

    <!-- interchain disulfides -->
    <path class="line thin" d="M175 240H225" />
    <text class="small" x="183" y="225">S–S</text>
    <path class="line thin" d="M120 175H155" />
    <text class="small" x="120" y="160">S–S</text>
    <path class="line thin" d="M245 175H280" />
    <text class="small" x="245" y="160">S–S</text>

    <text class="label" x="150" y="560">IgG</text>
    <text class="label blue" x="330" y="320">NH2</text>
  </g>

  <!-- plus sign -->
  <text class="label" x="560" y="290">+</text>

  <!-- TFP-linker-payload (top right) -->
  <g transform="translate(640,80)">
    <!-- phenyl ring -->
    <path class="line" d="M40 120 L110 80 L180 120 L180 200 L110 240 L40 200 Z" />
    <text class="small" x="102" y="70">F</text>
    <text class="small" x="185" y="120">F</text>
    <text class="small" x="105" y="270">F</text>
    <text class="small" x="5" y="120">F</text>

    <!-- ester linkage to linker-payload -->
    <path class="line" d="M180 160 L260 160" />
    <path class="line thin" d="M260 160 L300 120" />
    <text class="small red" x="292" y="112">O</text>
    <path class="line" d="M300 120 L360 120" />
    <path class="line" d="M360 120 L400 150" />

    <rect class="payload" x="400" y="95" rx="24" ry="24" width="200" height="90" />
    <text class="label" x="438" y="145">Linker</text>
    <text class="label" x="438" y="178">Payload</text>

    <text class="label" x="20" y="320">TFP‑linker‑Payload</text>
  </g>

  <!-- reaction arrow -->
  <path class="line" d="M700 360 L700 520" marker-end="url(#arrow)" />

  <!-- IgG conjugate (bottom left) -->
  <g transform="translate(70,470)">
    <path class="line" d="M200 320V120" />
    <path class="line" d="M200 120L80 -30" />
    <path class="line" d="M200 120L320 -30" />
    <path class="line thin" d="M185 320V140" />
    <path class="line thin" d="M215 320V140" />
    <path class="line thin" d="M185 140L80 10" />
    <path class="line thin" d="M215 140L320 10" />
    <path class="line thin" d="M70 -30L150 90" />
    <path class="line thin" d="M330 -30L250 90" />

    <path class="line thin" d="M175 110H225" />
    <text class="small" x="183" y="95">S–S</text>
    <path class="line thin" d="M120 45H155" />
    <text class="small" x="120" y="30">S–S</text>
    <path class="line thin" d="M245 45H280" />
    <text class="small" x="245" y="30">S–S</text>

    <!-- amide to linker-payload -->
    <path class="line" d="M325 170 L380 190" />
    <path class="line" d="M380 190 L420 170" />
    <text class="small red" x="415" y="165">O</text>
    <rect class="payload" x="420" y="150" rx="22" ry="22" width="190" height="80" />
    <text class="label" x="450" y="195">Linker</text>
    <text class="label" x="450" y="228">Payload</text>

    <text class="label" x="40" y="360">IgG conjugate</text>
  </g>

  <!-- plus sign -->
  <text class="label" x="560" y="760">+</text>

  <!-- TFP leaving group (bottom right) -->
  <g transform="translate(840,560)">
    <path class="line" d="M40 120 L110 80 L180 120 L180 200 L110 240 L40 200 Z" />
    <text class="small" x="102" y="70">F</text>
    <text class="small" x="185" y="120">F</text>
    <text class="small" x="105" y="270">F</text>
    <text class="small" x="5" y="120">F</text>
    <text class="label" x="20" y="310">TFP</text>
  </g>
</svg>
